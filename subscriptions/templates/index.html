{% extends 'base.html' %}

{% block content %}

<div class="hero">

    <h1>Welcome to Subscription Manager</h1>

    <p>
        Track and manage all your subscriptions in one beautiful dashboard.
    </p>

    {% if user.is_authenticated %}

        <a href="/dashboard/" class="btn">
            Open Dashboard
        </a>

    {% else %}

        <a href="/accounts/login/" class="btn">
            Login
        </a>

        <a href="/register/" class="btn">
            Register
        </a>

    {% endif %}

</div>

{% endblock %}
