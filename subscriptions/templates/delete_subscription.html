{% extends 'base.html' %}

{% block content %}

<div class="delete-card">

    <h1>Delete Subscription</h1>

    <p>
        Are you sure you want to delete
        <strong>{{ subscription.name }}</strong>?
    </p>

    <form method="POST">

        {% csrf_token %}

        <button type="submit" class="delete-btn">
            Yes, Delete
        </button>

        <a href="{% url 'view_subscriptions' %}"
           class="cancel-btn">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
